<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluid Mosaic Plasma Membrane Simulation</title>
<style>
body{margin:0;background:#0b1e33;color:white;font-family:Arial;text-align:center}
h2{margin:6px;font-weight:600}
canvas{background:#102f4a;border:2px solid white;display:block;margin:auto;width:96vw;height:72vh}
</style>
</head>
<body><h2>Plasma Membrane – Fluid Mosaic Model (Educational Simulation)</h2>
<canvas id="membrane"></canvas><script>
const canvas=document.getElementById("membrane")
const ctx=canvas.getContext("2d")

function resize(){
 canvas.width=window.innerWidth*0.96
 canvas.height=window.innerHeight*0.72
}
resize()
window.addEventListener("resize",resize)

const mid=()=>canvas.height/2
const upper=()=>mid()-45
const lower=()=>mid()+45

/* ---------------- PHOSPHOLIPID ---------------- */
class Phospholipid{
 constructor(x,leaflet){
  this.x=x
  this.leaflet=leaflet
 }

 move(){
  this.x+=(Math.random()-0.5)*0.8
  if(this.x<0)this.x=canvas.width
  if(this.x>canvas.width)this.x=0
 }

 draw(){

  const y=this.leaflet==='upper'?upper():lower()
  const dir=this.leaflet==='upper'?1:-1

  /* hydrophilic head */
  ctx.fillStyle="#66d0ff"
  ctx.beginPath()
  ctx.arc(this.x,y,5,0,Math.PI*2)
  ctx.fill()

  /* hydrophobic tails */
  ctx.strokeStyle="#ffc870"
  ctx.lineWidth=2
  ctx.beginPath()
  ctx.moveTo(this.x,y)
  ctx.lineTo(this.x-3,y+20*dir)
  ctx.moveTo(this.x,y)
  ctx.lineTo(this.x+3,y+20*dir)
  ctx.stroke()
 }
}

/* ---------------- CHOLESTEROL ---------------- */
class Cholesterol{
 constructor(x){this.x=x}
 move(){this.x+=(Math.random()-0.5)*0.25}
 draw(){
  ctx.fillStyle="#ffe066"
  ctx.fillRect(this.x-2,mid()-14,4,28)
 }
}

/* ---------------- TRANSMEMBRANE PROTEIN ---------------- */
class Protein{
 constructor(x){this.x=x}
 move(){this.x+=(Math.random()-0.5)*0.35}
 draw(){
  ctx.fillStyle="#a78bfa"
  ctx.fillRect(this.x-10,mid()-35,20,70)
 }
}

/* ---------------- ION CHANNEL ---------------- */
class IonChannel{
 constructor(x){
  this.x=x
  this.open=Math.random()>0.5
 }

 move(){
  this.x+=(Math.random()-0.5)*0.25

  if(Math.random()<0.004){
   this.open=!this.open
  }
 }

 draw(){
  ctx.fillStyle="#8b5cf6"
  ctx.fillRect(this.x-9,mid()-35,18,70)

  if(this.open){
   ctx.strokeStyle="#00ffd0"
   ctx.lineWidth=2
   ctx.beginPath()
   ctx.moveTo(this.x,mid()-30)
   ctx.lineTo(this.x,mid()+30)
   ctx.stroke()
  }
 }
}

/* ---------------- GLYCOPROTEIN ---------------- */
class Glycoprotein{
 constructor(x){this.x=x}
 move(){this.x+=(Math.random()-0.5)*0.25}
 draw(){
  ctx.fillStyle="#a78bfa"
  ctx.fillRect(this.x-9,mid()-30,18,60)

  ctx.strokeStyle="#6ee7b7"
  ctx.beginPath()
  ctx.moveTo(this.x,mid()-30)
  ctx.lineTo(this.x,mid()-50)
  ctx.lineTo(this.x+6,mid()-60)
  ctx.stroke()
 }
}

/* ---------------- CYTOSKELETON ---------------- */
class Cytoskeleton{
 constructor(x){this.x=x}
 draw(){
  ctx.strokeStyle="#ff7a7a"
  ctx.lineWidth=2
  ctx.beginPath()
  ctx.moveTo(this.x,lower()+22)
  ctx.lineTo(this.x+30,lower()+55)
  ctx.lineTo(this.x+60,lower()+22)
  ctx.stroke()
 }
}

/* ---------------- LIPID RAFT ---------------- */
class LipidRaft{
 constructor(x){this.x=x}
 move(){this.x+=(Math.random()-0.5)*0.15}
 draw(){
  ctx.fillStyle="rgba(255,230,120,0.25)"
  ctx.beginPath()
  ctx.ellipse(this.x,mid(),70,30,0,0,Math.PI*2)
  ctx.fill()
 }
}

/* ---------------- FLIPPASE ---------------- */
class Flippase{
 constructor(x){this.x=x}
 draw(){ctx.fillStyle="#22d3ee";ctx.fillRect(this.x-5,mid()-12,10,24)}

 transport(lipid){
  lipid.leaflet = lipid.leaflet==='upper' ? 'lower' : 'upper'
 }
}

/* ---------------- ARRAYS ---------------- */

const lipids=[]
const cholesterol=[]
const proteins=[]
const channels=[]
const glycoproteins=[]
const cytoskeleton=[]
const rafts=[]
const enzymes=[]

for(let i=0;i<120;i++){
 lipids.push(new Phospholipid(Math.random()*canvas.width,'upper'))
 lipids.push(new Phospholipid(Math.random()*canvas.width,'lower'))
}

for(let i=0;i<35;i++) cholesterol.push(new Cholesterol(Math.random()*canvas.width))

for(let i=0;i<6;i++) proteins.push(new Protein(Math.random()*canvas.width))

for(let i=0;i<4;i++) channels.push(new IonChannel(Math.random()*canvas.width))

for(let i=0;i<5;i++) glycoproteins.push(new Glycoprotein(Math.random()*canvas.width))

for(let i=0;i<5;i++) cytoskeleton.push(new Cytoskeleton(Math.random()*canvas.width))

for(let i=0;i<2;i++) rafts.push(new LipidRaft(Math.random()*canvas.width))

for(let i=0;i<2;i++) enzymes.push(new Flippase(Math.random()*canvas.width))

/* ---------------- LABELS ---------------- */
function labels(){
 ctx.fillStyle="white"
 ctx.font="14px Arial"

 ctx.fillText("Extracellular side",20,20)
 ctx.fillText("Hydrophilic phospholipid heads",20,upper()-10)
 ctx.fillText("Hydrophobic lipid core",20,mid()+4)
 ctx.fillText("Hydrophilic phospholipid heads",20,lower()+22)
 ctx.fillText("Cytoplasmic side",20,canvas.height-18)
}

/* ---------------- ANIMATION ---------------- */
function animate(){
 ctx.clearRect(0,0,canvas.width,canvas.height)

 rafts.forEach(r=>{r.move();r.draw()})

 lipids.forEach(l=>{l.move();l.draw()})
 cholesterol.forEach(c=>{c.move();c.draw()})
 proteins.forEach(p=>{p.move();p.draw()})
 channels.forEach(c=>{c.move();c.draw()})
 glycoproteins.forEach(g=>{g.move();g.draw()})
 cytoskeleton.forEach(c=>c.draw())
 enzymes.forEach(e=>e.draw())

 /* rare flip-flop */
 if(Math.random()<0.01){
  const lipid=lipids[Math.floor(Math.random()*lipids.length)]
  const enzyme=enzymes[Math.floor(Math.random()*enzymes.length)]
  enzyme.transport(lipid)
 }

 labels()

 requestAnimationFrame(animate)
}

animate()
</script></body>
</html>
