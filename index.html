<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
margin:0;
background:#020617;
color:white;
text-align:center;
font-family:Arial;
}
canvas{
width:96vw;
height:90vh;
border:2px solid white;
display:block;
margin:auto;
}
</style>
</head>

<body>

<h2>Fluid Mosaic Plasma Membrane Simulation</h2>

<canvas id="membrane"></canvas>

<script>

const canvas = document.getElementById("membrane")
const ctx = canvas.getContext("2d")

function resize(){
canvas.width = window.innerWidth*0.96
canvas.height = window.innerHeight*0.9
}
resize()
window.addEventListener("resize",resize)

const centerX=()=>canvas.width/2
const centerY=()=>canvas.height/2

const outerRadius=()=>Math.min(canvas.width,canvas.height)/3
const innerRadius=()=>outerRadius()-25


class Lipid{

constructor(angle,leaflet){

this.angle=angle
this.leaflet=leaflet

}

move(){

this.angle += (Math.random()-0.5)*0.002

}

draw(){

const r=this.leaflet=="outer"?outerRadius():innerRadius()

const x=centerX()+r*Math.cos(this.angle)
const y=centerY()+r*Math.sin(this.angle)

const dir=this.leaflet=="outer"?-1:1

/* head */

ctx.fillStyle="#4dabf7"
ctx.beginPath()
ctx.arc(x,y,4,0,Math.PI*2)
ctx.fill()

/* tails */

ctx.strokeStyle="#ffd43b"
ctx.beginPath()

ctx.moveTo(x,y)
ctx.lineTo(x+dir*10*Math.cos(this.angle),y+dir*10*Math.sin(this.angle))

ctx.moveTo(x,y)
ctx.lineTo(x+dir*10*Math.cos(this.angle+0.2),y+dir*10*Math.sin(this.angle+0.2))

ctx.stroke()

}

}


class Protein{

constructor(angle){
this.angle=angle
}

move(){
this.angle+=(Math.random()-0.5)*0.001
}

draw(){

const r=(outerRadius()+innerRadius())/2

const x=centerX()+r*Math.cos(this.angle)
const y=centerY()+r*Math.sin(this.angle)

ctx.fillStyle="#845ef7"

ctx.beginPath()
ctx.arc(x,y,8,0,Math.PI*2)
ctx.fill()

}

}


class Cholesterol{

constructor(angle){
this.angle=angle
}

move(){
this.angle+=(Math.random()-0.5)*0.0008
}

draw(){

const r=(outerRadius()+innerRadius())/2

const x=centerX()+r*Math.cos(this.angle)
const y=centerY()+r*Math.sin(this.angle)

ctx.fillStyle="#ffe066"
ctx.fillRect(x-2,y-6,4,12)

}

}


const lipids=[]
const proteins=[]
const cholesterol=[]


for(let i=0;i<180;i++){

lipids.push(new Lipid(Math.random()*Math.PI*2,"outer"))
lipids.push(new Lipid(Math.random()*Math.PI*2,"inner"))

}

for(let i=0;i<12;i++)
proteins.push(new Protein(Math.random()*Math.PI*2))

for(let i=0;i<40;i++)
cholesterol.push(new Cholesterol(Math.random()*Math.PI*2))


function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

lipids.forEach(l=>{
l.move()
l.draw()
})

proteins.forEach(p=>{
p.move()
p.draw()
})

cholesterol.forEach(c=>{
c.move()
c.draw()
})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
