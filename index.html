<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cell Membrane Fluid Mosaic Simulation</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#0a0f1f;
color:white;
overflow:hidden;
}

#ui{
position:fixed;
top:10px;
left:10px;
background:rgba(0,0,0,0.6);
padding:15px;
border-radius:10px;
backdrop-filter:blur(5px);
max-width:280px;
}

label{
display:block;
font-size:13px;
margin-top:10px;
}

input[type=range]{
width:100%;
}

#fluidityDisplay{
font-size:18px;
margin-top:10px;
color:#00e0ff;
}

canvas{
display:block;
}

</style>
</head>

<body>

<div id="ui">

<b>Membrane Controls</b>

<label>Temperature</label>
<input id="temp" type="range" min="0" max="100" value="50">

<label>Cholesterol</label>
<input id="chol" type="range" min="0" max="100" value="30">

<label>Saturated Lipids</label>
<input id="sat" type="range" min="0" max="100" value="40">

<label>Animation Speed</label>
<input id="speed" type="range" min="0.2" max="3" step="0.1" value="1">

<div id="fluidityDisplay">Fluidity: 50</div>

</div>

<canvas id="canvas"></canvas>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}

window.addEventListener("resize",resize)
resize()

const lipids=[]
const cholesterols=[]
const proteins=[]

let speed=1

class Lipid{

constructor(x,y,top){

this.x=x
this.y=y
this.top=top

this.vx=(Math.random()-0.5)*1
this.vy=(Math.random()-0.5)*1

this.angle=Math.random()*Math.PI
this.rotation=(Math.random()-0.5)*0.02

this.tailLength=20+Math.random()*10

}

move(fluidity){

this.x+=this.vx*fluidity*speed
this.y+=this.vy*fluidity*speed

this.angle+=this.rotation

if(this.x<0) this.x=canvas.width
if(this.x>canvas.width) this.x=0

}

draw(){

ctx.save()

ctx.translate(this.x,this.y)
ctx.rotate(this.angle)

ctx.fillStyle="#6ec5ff"

ctx.beginPath()
ctx.arc(0,0,6,0,Math.PI*2)
ctx.fill()

ctx.strokeStyle="#ffb347"
ctx.lineWidth=2

ctx.beginPath()
ctx.moveTo(-2,6)
ctx.lineTo(-3,this.tailLength)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(2,6)
ctx.lineTo(3,this.tailLength)
ctx.stroke()

ctx.restore()

}

}

class Cholesterol{

constructor(x,y){

this.x=x
this.y=y
this.vx=(Math.random()-0.5)*0.3

}

move(fluidity){

this.x+=this.vx*fluidity*speed

if(this.x<0) this.x=canvas.width
if(this.x>canvas.width) this.x=0

}

draw(){

ctx.fillStyle="#9b59ff"

ctx.fillRect(this.x-3,this.y-8,6,16)

}

}

class Protein{

constructor(x){

this.x=x
this.offset=Math.random()*20

}

draw(){

let top=canvas.height/2-60
let bottom=canvas.height/2+60

ctx.fillStyle="#4cff7a"

ctx.beginPath()
ctx.roundRect(this.x-12,top,24,bottom-top,10)
ctx.fill()

}

}

function init(){

for(let i=0;i<220;i++){

let x=Math.random()*canvas.width

let top=true

let y

if(i<110){
y=canvas.height/2-40-Math.random()*20
top=true
}
else{
y=canvas.height/2+40+Math.random()*20
top=false
}

lipids.push(new Lipid(x,y,top))

}

for(let i=0;i<40;i++){

let x=Math.random()*canvas.width
let y=canvas.height/2+(Math.random()*60-30)

cholesterols.push(new Cholesterol(x,y))

}

for(let i=0;i<10;i++){

let x=Math.random()*canvas.width

proteins.push(new Protein(x))

}

}

init()

function getFluidity(){

let temp=document.getElementById("temp").value
let chol=document.getElementById("chol").value
let sat=document.getElementById("sat").value

let fluidity=(temp*0.6 + (100-sat)*0.4)/100

fluidity*=1-(chol/200)

return fluidity

}

function drawBilayer(){

let mid=canvas.height/2

ctx.fillStyle="rgba(255,255,255,0.05)"

ctx.fillRect(0,mid-70,canvas.width,140)

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawBilayer()

let fluidity=getFluidity()

document.getElementById("fluidityDisplay").innerText=
"Fluidity: "+Math.round(fluidity*100)

lipids.forEach(l=>{
l.move(fluidity)
l.draw()
})

cholesterols.forEach(c=>{
c.move(fluidity)
c.draw()
})

proteins.forEach(p=>{
p.draw()
})

speed=document.getElementById("speed").value

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
