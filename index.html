<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Membrane Fluidity Simulation</title>
<style>
body{margin:0;background:#061521;color:white;font-family:Arial;text-align:center}
h1{margin:10px}
canvas{background:#0e2f4d;border:2px solid #ffffff;display:block;margin:auto}
</style>
</head>
<body>
<h1>Real‑Time Cell Membrane Fluidity Simulation</h1>
<p>Phospholipids move laterally demonstrating the fluid mosaic model</p><canvas id="membrane" width="900" height="420"></canvas>

<script>
const canvas=document.getElementById("membrane");
const ctx=canvas.getContext("2d");

class Lipid{
 constructor(x,y,dir){
  this.x=x
  this.y=y
  this.dir=dir
  this.vx=(Math.random()-0.5)*1.2
 }
 move(){
  this.x+=this.vx
  if(this.x<0||this.x>canvas.width){this.vx*=-1}
 }
 draw(){
  ctx.fillStyle="#7fd3ff"
  ctx.beginPath()
  ctx.arc(this.x,this.y,6,0,Math.PI*2)
  ctx.fill()

  ctx.strokeStyle="#ffd27f"
  ctx.lineWidth=2
  ctx.beginPath()
  ctx.moveTo(this.x,this.y)
  ctx.lineTo(this.x,this.y+20*this.dir)
  ctx.stroke()
 }
}

class Protein{
 constructor(x){
  this.x=x
 }
 move(){
  this.x+=Math.sin(Date.now()/500)/3
 }
 draw(){
  ctx.fillStyle="#b084ff"
  ctx.fillRect(this.x-12,170,24,80)
 }
}

class Cholesterol{
 constructor(x,y){
  this.x=x
  this.y=y
 }
 move(){
  this.x+=Math.sin(Date.now()/700)/4
 }
 draw(){
  ctx.fillStyle="#ffd94a"
  ctx.fillRect(this.x-3,this.y-8,6,16)
 }
}

const lipids=[]
const proteins=[]
const chol=[]

for(let i=0;i<80;i++){
 lipids.push(new Lipid(Math.random()*900,150,1))
 lipids.push(new Lipid(Math.random()*900,270,-1))
}

for(let i=0;i<6;i++){
 proteins.push(new Protein(Math.random()*900))
}

for(let i=0;i<30;i++){
 chol.push(new Cholesterol(Math.random()*900,210))
}

function animate(){
 ctx.clearRect(0,0,canvas.width,canvas.height)

 lipids.forEach(l=>{l.move();l.draw()})
 proteins.forEach(p=>{p.move();p.draw()})
 chol.forEach(c=>{c.move();c.draw()})

 ctx.fillStyle="white"
 ctx.font="14px Arial"
 ctx.fillText("Phospholipid heads",20,140)
 ctx.fillText("Hydrophobic tails",20,310)

 requestAnimationFrame(animate)
}

animate()
</script></body>
</html>
