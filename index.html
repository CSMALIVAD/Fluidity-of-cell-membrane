<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Membrane Fluidity Simulator</title>
<style>
body{margin:0;background:#061521;color:white;font-family:Arial;text-align:center}
h1{margin:10px}
.controls{margin:10px}
canvas{background:#0e2f4d;border:2px solid #ffffff;display:block;margin:auto}
label{margin:0 10px}
</style>
</head>
<body><h1>Advanced Cell Membrane Fluidity Simulator</h1><div class="controls">
<label>Temperature 🌡</label>
<input type="range" id="temp" min="0" max="100" value="50"><label>Lipid Type 🧬</label> <select id="lipidType">

<option value="saturated">Saturated</option>
<option value="cis">Cis‑Unsaturated</option>
<option value="trans">Trans‑Unsaturated</option>
</select>
</div><canvas id="membrane" width="900" height="420"></canvas>

<script>
const canvas=document.getElementById("membrane")
const ctx=canvas.getContext("2d")

const lipids=[]

class Lipid{
 constructor(x,y,dir){
  this.x=x
  this.y=y
  this.dir=dir
 }

 move(){
  const temp=document.getElementById("temp").value
  const lipidType=document.getElementById("lipidType").value

  let speed=temp/50

  if(lipidType==="saturated") speed*=0.6
  if(lipidType==="cis") speed*=1.4
  if(lipidType==="trans") speed*=0.9

  const brownian=(Math.random()-0.5)*speed
  this.x+=brownian

  if(this.x<0)this.x=canvas.width
  if(this.x>canvas.width)this.x=0
 }

 draw(){

  const lipidType=document.getElementById("lipidType").value

  ctx.fillStyle="#7fd3ff"
  ctx.beginPath()
  ctx.arc(this.x,this.y,6,0,Math.PI*2)
  ctx.fill()

  ctx.strokeStyle="#ffd27f"
  ctx.lineWidth=2

  ctx.beginPath()

  if(lipidType==="cis"){
   ctx.moveTo(this.x,this.y)
   ctx.lineTo(this.x+4,this.y+10*this.dir)
   ctx.lineTo(this.x-4,this.y+20*this.dir)
  }
  else if(lipidType==="trans"){
   ctx.moveTo(this.x,this.y)
   ctx.lineTo(this.x+2,this.y+20*this.dir)
  }
  else{
   ctx.moveTo(this.x,this.y)
   ctx.lineTo(this.x,this.y+20*this.dir)
  }

  ctx.stroke()
 }
}

for(let i=0;i<120;i++){
 lipids.push(new Lipid(Math.random()*900,150,1))
 lipids.push(new Lipid(Math.random()*900,270,-1))
}

function drawLabels(){
 ctx.fillStyle="white"
 ctx.font="14px Arial"
 ctx.fillText("Phospholipid Heads",20,140)
 ctx.fillText("Hydrophobic Tails",20,310)

 const temp=document.getElementById("temp").value
 const lipidType=document.getElementById("lipidType").value

 ctx.fillText("Temperature: "+temp,720,30)
 ctx.fillText("Lipid: "+lipidType,720,50)
}

function animate(){
 ctx.clearRect(0,0,canvas.width,canvas.height)

 lipids.forEach(l=>{
  l.move()
  l.draw()
 })

 drawLabels()

 requestAnimationFrame(animate)
}

animate()
</script></body>
</html>
