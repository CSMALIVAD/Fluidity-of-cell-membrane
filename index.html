<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#020617;
color:white;
font-family:Arial;
text-align:center;
}

canvas{
width:96vw;
height:90vh;
display:block;
margin:auto;
border:2px solid white;
}

.legend{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:8px;
font-size:13px;
text-align:left;
}

.symbol{
width:12px;
height:12px;
display:inline-block;
margin-right:6px;
}

.label{
position:absolute;
left:50%;
transform:translateX(-50%);
font-size:13px;
}

#extra{top:40px}
#outerleaf{top:calc(50% - 140px)}
#core{top:50%}
#innerleaf{top:calc(50% + 140px)}
#cyto{bottom:40px}

</style>
</head>

<body>

<canvas id="membrane"></canvas>

<div id="extra" class="label">Extracellular Space</div>
<div id="outerleaf" class="label">Outer Leaflet (Hydrophilic Heads)</div>
<div id="core" class="label">Hydrophobic Lipid Core</div>
<div id="innerleaf" class="label">Inner Leaflet (Hydrophilic Heads)</div>
<div id="cyto" class="label">Cytoplasm</div>

<div class="legend">

<div><span class="symbol" style="background:#4dabf7"></span>Phospholipid head</div>
<div><span class="symbol" style="background:#ffd43b"></span>Fatty acid tails</div>
<div><span class="symbol" style="background:#845ef7"></span>Integral protein</div>
<div><span class="symbol" style="background:#ffe066"></span>Cholesterol</div>
<div><span class="symbol" style="background:#40c057"></span>Carbohydrate chain</div>

</div>

<script>

const canvas=document.getElementById("membrane")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth*0.96
canvas.height=window.innerHeight*0.9
}
resize()
window.addEventListener("resize",resize)

const centerX=()=>canvas.width/2
const centerY=()=>canvas.height/2

const outerR=()=>Math.min(canvas.width,canvas.height)/3
const innerR=()=>outerR()-32

/* =========================
PHOSPHOLIPID
========================= */

class Lipid{

constructor(angle,leaflet){
this.angle=angle
this.leaflet=leaflet
}

move(){
this.angle+=(Math.random()-0.5)*0.002
}

draw(){

const r=this.leaflet==="outer"?outerR():innerR()

const x=centerX()+r*Math.cos(this.angle)
const y=centerY()+r*Math.sin(this.angle)

const dir=this.leaflet==="outer"?-1:1

/* head */

ctx.fillStyle="#4dabf7"

ctx.beginPath()
ctx.arc(x,y,3.5,0,Math.PI*2)
ctx.fill()

/* tails */

ctx.strokeStyle="#ffd43b"

ctx.beginPath()

ctx.moveTo(x,y)
ctx.lineTo(x+dir*14*Math.cos(this.angle),
           y+dir*14*Math.sin(this.angle))

ctx.moveTo(x,y)
ctx.lineTo(x+dir*14*Math.cos(this.angle+0.25),
           y+dir*14*Math.sin(this.angle+0.25))

ctx.stroke()

}

}

/* =========================
CHOLESTEROL
========================= */

class Cholesterol{

constructor(angle){
this.angle=angle
}

move(){
this.angle+=(Math.random()-0.5)*0.0008
}

draw(){

const r=(outerR()+innerR())/2

const x=centerX()+r*Math.cos(this.angle)
const y=centerY()+r*Math.sin(this.angle)

ctx.fillStyle="#ffe066"
ctx.fillRect(x-1.5,y-6,3,12)

}

}

/* =========================
INTEGRAL PROTEIN
========================= */

class Protein{

constructor(angle){
this.angle=angle
}

move(){
this.angle+=(Math.random()-0.5)*0.001
}

draw(){

const r=(outerR()+innerR())/2

const x=centerX()+r*Math.cos(this.angle)
const y=centerY()+r*Math.sin(this.angle)

ctx.fillStyle="#845ef7"

ctx.beginPath()
ctx.arc(x,y,9,0,Math.PI*2)
ctx.fill()

}

}

/* =========================
ION CHANNEL
========================= */

class IonChannel{

constructor(angle){
this.angle=angle
this.open=Math.random()>0.5
}

move(){

this.angle+=(Math.random()-0.5)*0.001

if(Math.random()<0.003){
this.open=!this.open
}

}

draw(){

const r=(outerR()+innerR())/2

const x=centerX()+r*Math.cos(this.angle)
const y=centerY()+r*Math.sin(this.angle)

ctx.fillStyle="#7b2cbf"

ctx.beginPath()
ctx.arc(x,y,9,0,Math.PI*2)
ctx.fill()

if(this.open){

ctx.strokeStyle="#00e5ff"

ctx.beginPath()
ctx.moveTo(x-3,y)
ctx.lineTo(x+3,y)
ctx.stroke()

}

}

}

/* =========================
GLYCOPROTEIN
========================= */

class Glycoprotein{

constructor(angle){
this.angle=angle
}

move(){
this.angle+=(Math.random()-0.5)*0.001
}

draw(){

const r=outerR()

const x=centerX()+r*Math.cos(this.angle)
const y=centerY()+r*Math.sin(this.angle)

ctx.fillStyle="#845ef7"

ctx.beginPath()
ctx.arc(x,y,7,0,Math.PI*2)
ctx.fill()

ctx.strokeStyle="#40c057"

ctx.beginPath()
ctx.moveTo(x,y)
ctx.lineTo(x+18*Math.cos(this.angle),
           y+18*Math.sin(this.angle))
ctx.stroke()

}

}

/* =========================
GLYCOLIPID
========================= */

class Glycolipid{

constructor(angle){
this.angle=angle
}

move(){
this.angle+=(Math.random()-0.5)*0.001
}

draw(){

const r=outerR()

const x=centerX()+r*Math.cos(this.angle)
const y=centerY()+r*Math.sin(this.angle)

ctx.fillStyle="#4dabf7"

ctx.beginPath()
ctx.arc(x,y,3.5,0,Math.PI*2)
ctx.fill()

ctx.strokeStyle="#40c057"

ctx.beginPath()
ctx.moveTo(x,y)
ctx.lineTo(x+14*Math.cos(this.angle),
           y+14*Math.sin(this.angle))
ctx.stroke()

}

}

/* =========================
PERIPHERAL PROTEIN
========================= */

class Peripheral{

constructor(angle){
this.angle=angle
}

move(){
this.angle+=(Math.random()-0.5)*0.002
}

draw(){

const r=innerR()-12

const x=centerX()+r*Math.cos(this.angle)
const y=centerY()+r*Math.sin(this.angle)

ctx.fillStyle="#f06595"

ctx.beginPath()
ctx.arc(x,y,4,0,Math.PI*2)
ctx.fill()

}

}

/* =========================
CYTOSKELETON
========================= */

class Cytoskeleton{

constructor(angle){
this.angle=angle
}

draw(){

const r=innerR()-10

const x=centerX()+r*Math.cos(this.angle)
const y=centerY()+r*Math.sin(this.angle)

ctx.strokeStyle="#fa5252"

ctx.beginPath()
ctx.moveTo(x,y)
ctx.lineTo(
x+20*Math.cos(this.angle+0.4),
y+20*Math.sin(this.angle+0.4)
)
ctx.stroke()

}

}

/* =========================
LIPID RAFT
========================= */

class Raft{

constructor(angle){
this.angle=angle
}

move(){
this.angle+=(Math.random()-0.5)*0.0005
}

draw(){

const r=(outerR()+innerR())/2

const x=centerX()+r*Math.cos(this.angle)
const y=centerY()+r*Math.sin(this.angle)

ctx.fillStyle="rgba(255,230,120,0.25)"

ctx.beginPath()
ctx.arc(x,y,18,0,Math.PI*2)
ctx.fill()

}

}

/* arrays */

const lipids=[]
const cholesterol=[]
const proteins=[]
const channels=[]
const glycoproteins=[]
const glycolipids=[]
const peripherals=[]
const cytoskeleton=[]
const rafts=[]

for(let i=0;i<120;i++){
lipids.push(new Lipid(Math.random()*Math.PI*2,"outer"))
lipids.push(new Lipid(Math.random()*Math.PI*2,"inner"))
}

for(let i=0;i<25;i++)
cholesterol.push(new Cholesterol(Math.random()*Math.PI*2))

for(let i=0;i<8;i++)
proteins.push(new Protein(Math.random()*Math.PI*2))

for(let i=0;i<5;i++)
channels.push(new IonChannel(Math.random()*Math.PI*2))

for(let i=0;i<6;i++)
glycoproteins.push(new Glycoprotein(Math.random()*Math.PI*2))

for(let i=0;i<6;i++)
glycolipids.push(new Glycolipid(Math.random()*Math.PI*2))

for(let i=0;i<8;i++)
peripherals.push(new Peripheral(Math.random()*Math.PI*2))

for(let i=0;i<10;i++)
cytoskeleton.push(new Cytoskeleton(Math.random()*Math.PI*2))

for(let i=0;i<3;i++)
rafts.push(new Raft(Math.random()*Math.PI*2))

/* animation */

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

rafts.forEach(r=>{r.move();r.draw()})

lipids.forEach(l=>{l.move();l.draw()})
cholesterol.forEach(c=>{c.move();c.draw()})
proteins.forEach(p=>{p.move();p.draw()})
channels.forEach(c=>{c.move();c.draw()})
glycoproteins.forEach(g=>{g.move();g.draw()})
glycolipids.forEach(g=>{g.move();g.draw()})
peripherals.forEach(p=>{p.move();p.draw()})
cytoskeleton.forEach(c=>c.draw())

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
