<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#020617;
font-family:Arial;
color:white;
text-align:center;
}

canvas{
width:100vw;
height:100vh;
display:block;
}

.label{
position:absolute;
left:50%;
transform:translateX(-50%);
font-size:14px;
}

#extra{top:20px}
#outer{top:35vh}
#core{top:50vh}
#inner{top:65vh}
#cyto{bottom:20px}

</style>
</head>

<body>

<canvas id="membrane"></canvas>

<div id="extra" class="label">Extracellular space</div>
<div id="outer" class="label">Outer leaflet (hydrophilic heads)</div>
<div id="core" class="label">Hydrophobic lipid core</div>
<div id="inner" class="label">Inner leaflet (hydrophilic heads)</div>
<div id="cyto" class="label">Cytoplasm</div>

<script>

const canvas=document.getElementById("membrane")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}
resize()
window.addEventListener("resize",resize)

const mid=()=>canvas.height/2

/* =========================
PHOSPHOLIPID
========================= */

class Lipid{

constructor(x,leaflet){

this.x=x
this.leaflet=leaflet

this.v=(Math.random()-0.5)*0.2

this.unsaturated=Math.random()<0.45

this.flip=false
this.flipProgress=0

}

move(){

this.x+=this.v

if(this.x<0) this.x=canvas.width
if(this.x>canvas.width) this.x=0

/* rare flip-flop */

if(!this.flip && Math.random()<0.00003){

this.flip=true
this.flipProgress=0

}

/* flip animation */

if(this.flip){

this.flipProgress+=0.02

if(this.flipProgress>=1){

this.flip=false
this.leaflet=this.leaflet==="outer"?"inner":"outer"

}

}

}

draw(){

let headY

if(this.flip){

const start=this.leaflet==="outer"?mid()-80:mid()+80
const end=this.leaflet==="outer"?mid()+80:mid()-80

headY=start+(end-start)*this.flipProgress

}else{

headY=this.leaflet==="outer"?mid()-80:mid()+80

}

const dir=this.leaflet==="outer"?1:-1

/* head */

ctx.fillStyle="#4dabf7"

ctx.beginPath()
ctx.arc(this.x,headY,6,0,Math.PI*2)
ctx.fill()

/* tails */

ctx.strokeStyle="#ffd43b"
ctx.lineWidth=2

ctx.beginPath()

if(this.unsaturated){

ctx.moveTo(this.x,headY)
ctx.quadraticCurveTo(this.x-8,headY+dir*15,this.x-4,headY+dir*32)

ctx.moveTo(this.x,headY)
ctx.lineTo(this.x+4,headY+dir*32)

}else{

ctx.moveTo(this.x,headY)
ctx.lineTo(this.x-4,headY+dir*32)

ctx.moveTo(this.x,headY)
ctx.lineTo(this.x+4,headY+dir*32)

}

ctx.stroke()

}

}

/* =========================
CHOLESTEROL
========================= */

class Cholesterol{

constructor(x){

this.x=x
this.v=(Math.random()-0.5)*0.12

}

move(){

this.x+=this.v

if(this.x<0) this.x=canvas.width
if(this.x>canvas.width) this.x=0

}

draw(){

const y=mid()

ctx.fillStyle="#ffe066"

/* height scaled to ~¾ bilayer thickness */

ctx.fillRect(this.x-3,y-24,6,48)

}

}

/* =========================
INTEGRAL PROTEIN
========================= */

class Protein{

constructor(x){
this.x=x
this.v=(Math.random()-0.5)*0.15
}

move(){

this.x+=this.v

if(this.x<0) this.x=canvas.width
if(this.x>canvas.width) this.x=0

}

draw(){

ctx.fillStyle="#845ef7"

ctx.beginPath()
ctx.roundRect(this.x-12,mid()-95,24,190,12)
ctx.fill()

}

}

/* arrays */

const lipids=[]
const cholesterol=[]
const proteins=[]

const spacing=14

for(let x=0;x<canvas.width;x+=spacing){

lipids.push(new Lipid(x,"outer"))
lipids.push(new Lipid(x,"inner"))

}

/* cholesterol */

for(let i=0;i<80;i++)
cholesterol.push(new Cholesterol(Math.random()*canvas.width))

/* proteins */

for(let i=0;i<10;i++)
proteins.push(new Protein(Math.random()*canvas.width))

/* =========================
ANIMATION
========================= */

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

/* membrane core */

ctx.fillStyle="rgba(255,255,255,0.06)"
ctx.fillRect(0,mid()-70,canvas.width,140)

lipids.forEach(l=>{l.move();l.draw()})
cholesterol.forEach(c=>{c.move();c.draw()})
proteins.forEach(p=>{p.move();p.draw()})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
