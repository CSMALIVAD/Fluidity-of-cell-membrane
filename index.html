<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cell Membrane Real-Time Simulation</title>
<style>
body{margin:0;background:#071a2c;color:white;font-family:Arial;text-align:center}
h2{margin:8px}
canvas{background:#0e2f4d;display:block;margin:auto;border:2px solid white;width:95vw;height:70vh}
</style>
</head>
<body><h2>Cell Membrane – Real Time Molecular Motion</h2><canvas id="membrane"></canvas>

<script>
const canvas=document.getElementById("membrane")
const ctx=canvas.getContext("2d")

function resize(){
 canvas.width=window.innerWidth*0.95
 canvas.height=window.innerHeight*0.7
}
resize()
window.addEventListener("resize",resize)

class Phospholipid{
 constructor(x,y,dir){
  this.x=x
  this.y=y
  this.dir=dir
 }

 move(){
  this.x+=(Math.random()-0.5)*1.2
  this.y+=(Math.random()-0.5)*0.3

  if(this.x<0)this.x=canvas.width
  if(this.x>canvas.width)this.x=0
 }

 draw(){
  ctx.fillStyle="#7fd3ff"
  ctx.beginPath()
  ctx.arc(this.x,this.y,5,0,Math.PI*2)
  ctx.fill()

  ctx.strokeStyle="#ffd27f"
  ctx.lineWidth=2
  ctx.beginPath()

  ctx.moveTo(this.x,this.y)
  ctx.lineTo(this.x,this.y+18*this.dir)

  ctx.stroke()
 }
}

class Protein{
 constructor(x){
  this.x=x
 }

 move(){
  this.x+=(Math.random()-0.5)*0.4
 }

 draw(){
  ctx.fillStyle="#b084ff"
  ctx.fillRect(this.x-12,canvas.height/2-40,24,80)
 }
}

class Cholesterol{
 constructor(x,y){
  this.x=x
  this.y=y
 }

 move(){
  this.x+=(Math.random()-0.5)*0.3
 }

 draw(){
  ctx.fillStyle="#ffd94a"
  ctx.fillRect(this.x-3,this.y-10,6,20)
 }
}

const lipids=[]
const proteins=[]
const cholesterol=[]

const upperY=canvas.height/2-60
const lowerY=canvas.height/2+60

for(let i=0;i<90;i++){
 lipids.push(new Phospholipid(Math.random()*canvas.width,upperY,1))
 lipids.push(new Phospholipid(Math.random()*canvas.width,lowerY,-1))
}

for(let i=0;i<7;i++){
 proteins.push(new Protein(Math.random()*canvas.width))
}

for(let i=0;i<30;i++){
 cholesterol.push(new Cholesterol(Math.random()*canvas.width,canvas.height/2))
}

function labels(){
 ctx.fillStyle="white"
 ctx.font="14px Arial"

 ctx.fillText("Hydrophilic Heads",20,upperY-10)
 ctx.fillText("Hydrophobic Fatty Acid Tails",20,canvas.height/2+5)
 ctx.fillText("Hydrophilic Heads",20,lowerY+25)

 ctx.fillText("Integral Proteins",canvas.width-150,canvas.height/2-50)
 ctx.fillText("Cholesterol",canvas.width-110,canvas.height/2+70)
}

function animate(){
 ctx.clearRect(0,0,canvas.width,canvas.height)

 lipids.forEach(l=>{l.move();l.draw()})
 proteins.forEach(p=>{p.move();p.draw()})
 cholesterol.forEach(c=>{c.move();c.draw()})

 labels()

 requestAnimationFrame(animate)
}

animate()
</script></body>
</html>
