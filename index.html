<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Fluid Mosaic Membrane Simulator</title>

<style>
body{
margin:0;
background:#020617;
color:white;
font-family:Arial;
text-align:center;
}

h2{
margin:8px;
}

canvas{
display:block;
margin:auto;
width:96vw;
height:90vh;
border:2px solid white;
}
</style>
</head>

<body>

<h2>3D Fluid Mosaic Plasma Membrane (WebGL Simulation)</h2>
<canvas id="glcanvas"></canvas>

<script>

/* ===========================
WEBGL INITIALIZATION
=========================== */

const canvas = document.getElementById("glcanvas")
const gl = canvas.getContext("webgl")

function resize(){
canvas.width = window.innerWidth*0.96
canvas.height = window.innerHeight*0.9
gl.viewport(0,0,canvas.width,canvas.height)
}

resize()
window.addEventListener("resize",resize)

if(!gl){
alert("WebGL not supported")
}

/* ===========================
SHADERS
=========================== */

const vertexShaderSource = `
attribute vec3 position;
uniform float time;
void main(){
float vibration = sin(time + position.x*4.0)*0.02;
gl_Position = vec4(position.x, position.y + vibration, position.z, 1.0);
gl_PointSize = 6.0;
}
`

const fragmentShaderSource = `
precision mediump float;
void main(){
gl_FragColor = vec4(0.3,0.7,1.0,1.0);
}
`

function compileShader(type, source){

const shader = gl.createShader(type)
gl.shaderSource(shader,source)
gl.compileShader(shader)

return shader

}

const vertexShader = compileShader(gl.VERTEX_SHADER,vertexShaderSource)
const fragmentShader = compileShader(gl.FRAGMENT_SHADER,fragmentShaderSource)

const program = gl.createProgram()

gl.attachShader(program,vertexShader)
gl.attachShader(program,fragmentShader)

gl.linkProgram(program)
gl.useProgram(program)

/* ===========================
PARTICLE SYSTEM (LIPIDS)
=========================== */

const particleCount = 2000
const positions = []

for(let i=0;i<particleCount;i++){

let angle = Math.random()*Math.PI*2
let r = 0.6 + (Math.random()-0.5)*0.05

let x = r*Math.cos(angle)
let y = r*Math.sin(angle)

positions.push(x,y,0)

}

/* GPU buffer */

const positionBuffer = gl.createBuffer()
gl.bindBuffer(gl.ARRAY_BUFFER,positionBuffer)
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(positions),gl.DYNAMIC_DRAW)

const positionLocation = gl.getAttribLocation(program,"position")

gl.enableVertexAttribArray(positionLocation)

gl.vertexAttribPointer(positionLocation,3,gl.FLOAT,false,0,0)

/* ===========================
TIME UNIFORM
=========================== */

const timeLocation = gl.getUniformLocation(program,"time")

let time = 0

/* ===========================
DIFFUSION SIMULATION
=========================== */

function diffuse(){

for(let i=0;i<positions.length;i+=3){

positions[i]+= (Math.random()-0.5)*0.002
positions[i+1]+= (Math.random()-0.5)*0.002

}

}

/* ===========================
ANIMATION LOOP
=========================== */

function animate(){

time += 0.03

diffuse()

gl.bindBuffer(gl.ARRAY_BUFFER,positionBuffer)
gl.bufferSubData(gl.ARRAY_BUFFER,0,new Float32Array(positions))

gl.clearColor(0.02,0.03,0.07,1)
gl.clear(gl.COLOR_BUFFER_BIT)

gl.uniform1f(timeLocation,time)

gl.drawArrays(gl.POINTS,0,particleCount)

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
