<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluid Mosaic Plasma Membrane Simulation</title>

<style>
body{
    margin:0;
    background:#0b132b;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    text-align:center;
}

h2{
    margin:8px;
    font-weight:600;
}

canvas{
    display:block;
    margin:auto;
    border:2px solid white;
    background:#020617;
    width:95vw;
    height:85vh;
}
</style>
</head>

<body>

<h2>Fluid Mosaic Model – Plasma Membrane Simulation</h2>

<canvas id="membrane"></canvas>

<script>

/* ==========================================
   CANVAS SETUP
========================================== */

const canvas = document.getElementById("membrane");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth * 0.95;
    canvas.height = window.innerHeight * 0.85;
}
resize();
window.addEventListener("resize", resize);

/* ==========================================
   CELL GEOMETRY
========================================== */

function center(){
    return {
        x: canvas.width/2,
        y: canvas.height/2
    };
}

function membraneRadius(){
    return Math.min(canvas.width, canvas.height) / 3;
}

const bilayerThickness = 22;

/* ==========================================
   PHOSPHOLIPID
========================================== */

class Phospholipid{

    constructor(angle, leaflet){
        this.angle = angle;
        this.leaflet = leaflet;
    }

    move(){
        this.angle += (Math.random() - 0.5) * 0.003;
    }

    draw(){

        const r = this.leaflet === "outer"
            ? membraneRadius()
            : membraneRadius() - bilayerThickness;

        const cx = center().x + r * Math.cos(this.angle);
        const cy = center().y + r * Math.sin(this.angle);

        const direction = this.leaflet === "outer" ? -1 : 1;

        /* hydrophilic head (blue) */

        ctx.fillStyle = "#60a5fa";
        ctx.beginPath();
        ctx.arc(cx, cy, 4, 0, Math.PI*2);
        ctx.fill();

        /* hydrophobic tails (yellow) */

        ctx.strokeStyle = "#facc15";
        ctx.lineWidth = 1.5;

        ctx.beginPath();

        ctx.moveTo(cx, cy);
        ctx.lineTo(
            cx + direction * 9 * Math.cos(this.angle),
            cy + direction * 9 * Math.sin(this.angle)
        );

        ctx.moveTo(cx, cy);
        ctx.lineTo(
            cx + direction * 9 * Math.cos(this.angle + 0.2),
            cy + direction * 9 * Math.sin(this.angle + 0.2)
        );

        ctx.stroke();
    }

}

/* ==========================================
   CHOLESTEROL
========================================== */

class Cholesterol{

    constructor(angle){
        this.angle = angle;
    }

    move(){
        this.angle += (Math.random() - 0.5) * 0.001;
    }

    draw(){

        const r = membraneRadius() - bilayerThickness/2;

        const cx = center().x + r * Math.cos(this.angle);
        const cy = center().y + r * Math.sin(this.angle);

        ctx.fillStyle = "#fde047";

        ctx.fillRect(cx-2, cy-6, 4, 12);
    }

}

/* ==========================================
   INTEGRAL PROTEIN
========================================== */

class Protein{

    constructor(angle){
        this.angle = angle;
    }

    move(){
        this.angle += (Math.random() - 0.5) * 0.0015;
    }

    draw(){

        const r = membraneRadius() - bilayerThickness/2;

        const cx = center().x + r * Math.cos(this.angle);
        const cy = center().y + r * Math.sin(this.angle);

        ctx.fillStyle = "#a78bfa";

        ctx.beginPath();
        ctx.arc(cx, cy, 7, 0, Math.PI*2);
        ctx.fill();
    }

}

/* ==========================================
   ION CHANNEL
========================================== */

class IonChannel{

    constructor(angle){
        this.angle = angle;
        this.open = Math.random() > 0.5;
    }

    move(){

        this.angle += (Math.random() - 0.5) * 0.001;

        if(Math.random() < 0.003){
            this.open = !this.open;
        }

    }

    draw(){

        const r = membraneRadius() - bilayerThickness/2;

        const cx = center().x + r * Math.cos(this.angle);
        const cy = center().y + r * Math.sin(this.angle);

        ctx.fillStyle = "#7c3aed";

        ctx.beginPath();
        ctx.arc(cx, cy, 8, 0, Math.PI*2);
        ctx.fill();

        if(this.open){

            ctx.strokeStyle = "#22d3ee";

            ctx.beginPath();
            ctx.moveTo(cx-3, cy);
            ctx.lineTo(cx+3, cy);
            ctx.stroke();

        }

    }

}

/* ==========================================
   GLYCOPROTEIN
========================================== */

class Glycoprotein{

    constructor(angle){
        this.angle = angle;
    }

    move(){
        this.angle += (Math.random() - 0.5) * 0.001;
    }

    draw(){

        const r = membraneRadius();

        const cx = center().x + r * Math.cos(this.angle);
        const cy = center().y + r * Math.sin(this.angle);

        ctx.fillStyle = "#a78bfa";

        ctx.beginPath();
        ctx.arc(cx, cy, 6, 0, Math.PI*2);
        ctx.fill();

        /* carbohydrate chain */

        ctx.strokeStyle = "#34d399";

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(
            cx + 12 * Math.cos(this.angle),
            cy + 12 * Math.sin(this.angle)
        );
        ctx.stroke();

    }

}

/* ==========================================
   PERIPHERAL PROTEIN
========================================== */

class Peripheral{

    constructor(angle){
        this.angle = angle;
    }

    move(){
        this.angle += (Math.random() - 0.5) * 0.002;
    }

    draw(){

        const r = membraneRadius() - 35;

        const cx = center().x + r * Math.cos(this.angle);
        const cy = center().y + r * Math.sin(this.angle);

        ctx.fillStyle = "#f472b6";

        ctx.beginPath();
        ctx.arc(cx, cy, 4, 0, Math.PI*2);
        ctx.fill();
    }

}

/* ==========================================
   LIPID RAFT
========================================== */

class Raft{

    constructor(angle){
        this.angle = angle;
    }

    move(){
        this.angle += (Math.random() - 0.5) * 0.0005;
    }

    draw(){

        const r = membraneRadius();

        const cx = center().x + r * Math.cos(this.angle);
        const cy = center().y + r * Math.sin(this.angle);

        ctx.fillStyle = "rgba(255,230,120,0.25)";

        ctx.beginPath();
        ctx.arc(cx, cy, 18, 0, Math.PI*2);
        ctx.fill();

    }

}

/* ==========================================
   CYTOSKELETON
========================================== */

class Cytoskeleton{

    constructor(angle){
        this.angle = angle;
    }

    draw(){

        const r = membraneRadius() - 25;

        const cx = center().x + r * Math.cos(this.angle);
        const cy = center().y + r * Math.sin(this.angle);

        ctx.strokeStyle = "#fb7185";

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(
            cx + 25*Math.cos(this.angle+0.3),
            cy + 25*Math.sin(this.angle+0.3)
        );
        ctx.stroke();

    }

}

/* ==========================================
   ARRAYS
========================================== */

const lipids = [];
const cholesterol = [];
const proteins = [];
const channels = [];
const glycoproteins = [];
const peripherals = [];
const rafts = [];
const cytoskeleton = [];

for(let i=0;i<180;i++){
    lipids.push(new Phospholipid(Math.random()*Math.PI*2,"outer"));
    lipids.push(new Phospholipid(Math.random()*Math.PI*2,"inner"));
}

for(let i=0;i<40;i++)
cholesterol.push(new Cholesterol(Math.random()*Math.PI*2));

for(let i=0;i<15;i++)
proteins.push(new Protein(Math.random()*Math.PI*2));

for(let i=0;i<6;i++)
channels.push(new IonChannel(Math.random()*Math.PI*2));

for(let i=0;i<8;i++)
glycoproteins.push(new Glycoprotein(Math.random()*Math.PI*2));

for(let i=0;i<10;i++)
peripherals.push(new Peripheral(Math.random()*Math.PI*2));

for(let i=0;i<3;i++)
rafts.push(new Raft(Math.random()*Math.PI*2));

for(let i=0;i<10;i++)
cytoskeleton.push(new Cytoskeleton(Math.random()*Math.PI*2));

/* ==========================================
   LABELS
========================================== */

function drawLabels(){

ctx.fillStyle = "white";
ctx.font = "14px Arial";

ctx.fillText("Extracellular space",20,30);
ctx.fillText("Cytoplasm",20,canvas.height-20);

}

/* ==========================================
   ANIMATION LOOP
========================================== */

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

rafts.forEach(r=>{r.move();r.draw()});

lipids.forEach(l=>{l.move();l.draw()});
cholesterol.forEach(c=>{c.move();c.draw()});
proteins.forEach(p=>{p.move();p.draw()});
channels.forEach(c=>{c.move();c.draw()});
glycoproteins.forEach(g=>{g.move();g.draw()});
peripherals.forEach(p=>{p.move();p.draw()});
cytoskeleton.forEach(c=>c.draw());

drawLabels();

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
