<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

body{
margin:0;
background:#020617;
color:white;
font-family:Arial;
text-align:center;
}

canvas{
width:96vw;
height:90vh;
display:block;
margin:auto;
border:2px solid white;
}

.legend{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.6);
padding:12px;
border-radius:8px;
font-size:14px;
text-align:left;
}

.symbol{
width:14px;
height:14px;
display:inline-block;
margin-right:6px;
}

.label{
position:absolute;
font-size:14px;
}

#extra{ top:10px; left:20px;}
#cyto{ bottom:10px; left:20px;}
#outerleaf{ top:120px; left:20px;}
#innerleaf{ bottom:120px; left:20px;}
#core{ top:50%; left:20px; transform:translateY(-50%);}

</style>
</head>

<body>

<canvas id="membrane"></canvas>

<div id="extra" class="label">Extracellular Space</div>
<div id="cyto" class="label">Cytoplasm</div>
<div id="outerleaf" class="label">Outer Leaflet (Hydrophilic Heads)</div>
<div id="innerleaf" class="label">Inner Leaflet (Hydrophilic Heads)</div>
<div id="core" class="label">Hydrophobic Lipid Core</div>

<div class="legend">

<div><span class="symbol" style="background:#4dabf7"></span>Phospholipid head</div>
<div><span class="symbol" style="background:#ffd43b"></span>Fatty acid tails</div>
<div><span class="symbol" style="background:#845ef7"></span>Integral membrane protein</div>
<div><span class="symbol" style="background:#ffe066"></span>Cholesterol</div>
<div><span class="symbol" style="background:#40c057"></span>Carbohydrate chain</div>

</div>

<script>

const canvas=document.getElementById("membrane")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth*0.96
canvas.height=window.innerHeight*0.9
}
resize()
window.addEventListener("resize",resize)

const centerX=()=>canvas.width/2
const centerY=()=>canvas.height/2

const outerR=()=>Math.min(canvas.width,canvas.height)/3
const innerR=()=>outerR()-28


class Lipid{

constructor(angle,leaflet){
this.angle=angle
this.leaflet=leaflet
}

move(){
this.angle+=(Math.random()-0.5)*0.002
}

draw(){

const r=this.leaflet=="outer"?outerR():innerR()

const x=centerX()+r*Math.cos(this.angle)
const y=centerY()+r*Math.sin(this.angle)

const dir=this.leaflet=="outer"?-1:1

ctx.fillStyle="#4dabf7"

ctx.beginPath()
ctx.arc(x,y,4,0,Math.PI*2)
ctx.fill()

ctx.strokeStyle="#ffd43b"

ctx.beginPath()

ctx.moveTo(x,y)
ctx.lineTo(x+dir*12*Math.cos(this.angle),y+dir*12*Math.sin(this.angle))

ctx.moveTo(x,y)
ctx.lineTo(x+dir*12*Math.cos(this.angle+0.2),y+dir*12*Math.sin(this.angle+0.2))

ctx.stroke()

}

}


class Protein{

constructor(angle){
this.angle=angle
}

move(){
this.angle+=(Math.random()-0.5)*0.001
}

draw(){

const r=(outerR()+innerR())/2

const x=centerX()+r*Math.cos(this.angle)
const y=centerY()+r*Math.sin(this.angle)

ctx.fillStyle="#845ef7"

ctx.beginPath()
ctx.arc(x,y,9,0,Math.PI*2)
ctx.fill()

}

}


class Cholesterol{

constructor(angle){
this.angle=angle
}

move(){
this.angle+=(Math.random()-0.5)*0.0008
}

draw(){

const r=(outerR()+innerR())/2

const x=centerX()+r*Math.cos(this.angle)
const y=centerY()+r*Math.sin(this.angle)

ctx.fillStyle="#ffe066"
ctx.fillRect(x-2,y-7,4,14)

}

}


class Glycoprotein{

constructor(angle){
this.angle=angle
}

move(){
this.angle+=(Math.random()-0.5)*0.001
}

draw(){

const r=outerR()

const x=centerX()+r*Math.cos(this.angle)
const y=centerY()+r*Math.sin(this.angle)

ctx.fillStyle="#845ef7"

ctx.beginPath()
ctx.arc(x,y,8,0,Math.PI*2)
ctx.fill()

ctx.strokeStyle="#40c057"

ctx.beginPath()
ctx.moveTo(x,y)
ctx.lineTo(x+15*Math.cos(this.angle),y+15*Math.sin(this.angle))
ctx.stroke()

}

}


const lipids=[]
const proteins=[]
const cholesterol=[]
const glycoproteins=[]

for(let i=0;i<160;i++){

lipids.push(new Lipid(Math.random()*Math.PI*2,"outer"))
lipids.push(new Lipid(Math.random()*Math.PI*2,"inner"))

}

for(let i=0;i<12;i++)
proteins.push(new Protein(Math.random()*Math.PI*2))

for(let i=0;i<40;i++)
cholesterol.push(new Cholesterol(Math.random()*Math.PI*2))

for(let i=0;i<6;i++)
glycoproteins.push(new Glycoprotein(Math.random()*Math.PI*2))


function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

lipids.forEach(l=>{l.move();l.draw()})
proteins.forEach(p=>{p.move();p.draw()})
cholesterol.forEach(c=>{c.move();c.draw()})
glycoproteins.forEach(g=>{g.move();g.draw()})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
