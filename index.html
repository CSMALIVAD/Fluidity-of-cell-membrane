<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Human Plasma Membrane – Dynamic Model</title>

<style>

body{
margin:0;
background:#050b1e;
overflow:hidden;
font-family:Arial;
}

canvas{
display:block;
}

</style>
</head>

<body>

<canvas id="membrane"></canvas>

<script>

const canvas=document.getElementById("membrane")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}

resize()
window.addEventListener("resize",resize)

let time=0

const lipids=[]
const chol=[]
const proteins=[]
const glyco=[]
const cytoskeleton=[]
const rafts=[]

const TOP=0
const BOTTOM=1

const mid=()=>canvas.height/2

class Lipid{

constructor(x,y,leaflet,type){

this.x=x
this.y=y
this.leaflet=leaflet

this.type=type

this.unsaturated=Math.random()<0.6

this.vx=(Math.random()-0.5)*0.4
this.vy=(Math.random()-0.5)*0.2

this.angle=Math.random()*Math.PI

}

move(fluid){

this.x+=this.vx*fluid
this.y+=this.vy*fluid

if(this.x<0) this.x=canvas.width
if(this.x>canvas.width) this.x=0

this.angle+=0.02

}

draw(){

ctx.save()

ctx.translate(this.x,this.y)
ctx.rotate(this.angle)

let headColor="#7fd3ff"

if(this.type=="SM") headColor="#9be0ff"
if(this.type=="PS") headColor="#ff9bb0"
if(this.type=="PE") headColor="#ffd580"

ctx.fillStyle=headColor

ctx.beginPath()
ctx.arc(0,0,4,0,Math.PI*2)
ctx.fill()

ctx.strokeStyle="#ffcc66"
ctx.lineWidth=2

ctx.beginPath()

ctx.moveTo(-2,5)

if(this.unsaturated)
ctx.quadraticCurveTo(-7,10,-3,18)
else
ctx.lineTo(-3,18)

ctx.stroke()

ctx.beginPath()

ctx.moveTo(2,5)

if(this.unsaturated)
ctx.quadraticCurveTo(7,10,3,18)
else
ctx.lineTo(3,18)

ctx.stroke()

ctx.restore()

}

}

class Cholesterol{

constructor(x,y){

this.x=x
this.y=y

this.vx=(Math.random()-0.5)*0.2

}

move(){

this.x+=this.vx

if(this.x<0) this.x=canvas.width
if(this.x>canvas.width) this.x=0

}

draw(){

ctx.fillStyle="#c084ff"

ctx.fillRect(this.x-2,this.y-7,4,14)

}

}

class Protein{

constructor(x){

this.x=x
this.vx=(Math.random()-0.5)*0.2

}

move(){

this.x+=this.vx

if(this.x<0) this.x=canvas.width
if(this.x>canvas.width) this.x=0

}

draw(){

let top=mid()-70
let bottom=mid()+70

ctx.fillStyle="#42ff8c"

ctx.beginPath()
ctx.roundRect(this.x-10,top,20,bottom-top,10)
ctx.fill()

}

}

class Glycoprotein{

constructor(x,y){

this.x=x
this.y=y

}

draw(){

ctx.strokeStyle="#ff7ac8"
ctx.lineWidth=2

ctx.beginPath()

ctx.moveTo(this.x,this.y)

for(let i=0;i<6;i++){

let dx=Math.sin(time*0.05+i)*5

ctx.lineTo(this.x+dx,this.y-10*(i+1))

}

ctx.stroke()

}

}

class Cytoskeleton{

constructor(x,y){

this.x=x
this.y=y

}

draw(){

ctx.strokeStyle="#ff4040"
ctx.lineWidth=2

ctx.beginPath()
ctx.moveTo(this.x,this.y)

ctx.lineTo(
this.x+40,
this.y+Math.sin(time*0.03)*8
)

ctx.stroke()

}

}

class LipidRaft{

constructor(){

this.x=Math.random()*canvas.width
this.radius=40+Math.random()*30
this.life=500+Math.random()*500

}

update(){

this.life--

}

draw(){

ctx.beginPath()
ctx.arc(this.x,mid(),this.radius,0,Math.PI*2)

ctx.fillStyle="rgba(255,255,255,0.03)"
ctx.fill()

}

}

function init(){

let lipidCount=400

for(let i=0;i<lipidCount;i++){

let x=Math.random()*canvas.width

if(i<lipidCount/2){

let y=mid()-40-Math.random()*25

let type=Math.random()<0.5?"PC":"SM"

lipids.push(new Lipid(x,y,TOP,type))

}else{

let y=mid()+40+Math.random()*25

let type=Math.random()<0.5?"PE":"PS"

lipids.push(new Lipid(x,y,BOTTOM,type))

}

}

let cholCount=140

for(let i=0;i<cholCount;i++){

let x=Math.random()*canvas.width
let y=mid()+Math.random()*60-30

chol.push(new Cholesterol(x,y))

}

for(let i=0;i<20;i++){

proteins.push(new Protein(Math.random()*canvas.width))

}

for(let i=0;i<50;i++){

glyco.push(new Glycoprotein(
Math.random()*canvas.width,
mid()-80
))

}

for(let i=0;i<40;i++){

cytoskeleton.push(new Cytoskeleton(
Math.random()*canvas.width,
mid()+90
))

}

}

init()

function fluidity(){

return 0.6+Math.sin(time*0.01)*0.2

}

function drawBilayer(){

ctx.fillStyle="rgba(255,255,255,0.04)"

ctx.fillRect(
0,
mid()-80,
canvas.width,
160
)

}

function updateRafts(){

if(Math.random()<0.01)
rafts.push(new LipidRaft())

rafts.forEach((r,i)=>{
r.update()

if(r.life<0)
rafts.splice(i,1)
})

}

function animate(){

time++

ctx.clearRect(0,0,canvas.width,canvas.height)

drawBilayer()

updateRafts()

rafts.forEach(r=>r.draw())

let f=fluidity()

lipids.forEach(l=>{
l.move(f)
l.draw()
})

chol.forEach(c=>{
c.move()
c.draw()
})

proteins.forEach(p=>{
p.move()
p.draw()
})

glyco.forEach(g=>g.draw())

cytoskeleton.forEach(a=>a.draw())

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
