<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#020617;
font-family:Arial;
color:white;
text-align:center;
}

canvas{
width:100vw;
height:100vh;
display:block;
}

.label{
position:absolute;
left:50%;
transform:translateX(-50%);
font-size:14px;
}

#extra{top:20px}
#outer{top:35vh}
#core{top:50vh}
#inner{top:65vh}
#cyto{bottom:20px}

</style>
</head>

<body>

<canvas id="membrane"></canvas>

<div id="extra" class="label">Extracellular space</div>
<div id="outer" class="label">Outer leaflet (hydrophilic heads)</div>
<div id="core" class="label">Hydrophobic core</div>
<div id="inner" class="label">Inner leaflet (hydrophilic heads)</div>
<div id="cyto" class="label">Cytoplasm</div>

<script>

const canvas=document.getElementById("membrane")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}
resize()
window.addEventListener("resize",resize)

const mid=()=>canvas.height/2

/* =========================
PHOSPHOLIPID
========================= */

class Lipid{

constructor(x,leaflet){

this.x=x
this.leaflet=leaflet
this.v=(Math.random()-0.5)*0.4

}

move(){

this.x+=this.v

if(this.x<0) this.x=canvas.width
if(this.x>canvas.width) this.x=0

}

draw(){

const headY=this.leaflet==="outer"?mid()-70:mid()+70
const dir=this.leaflet==="outer"?1:-1

/* head */

ctx.fillStyle="#4dabf7"

ctx.beginPath()
ctx.arc(this.x,headY,5,0,Math.PI*2)
ctx.fill()

/* tails */

ctx.strokeStyle="#ffd43b"
ctx.lineWidth=2

ctx.beginPath()

ctx.moveTo(this.x,headY)
ctx.lineTo(this.x-3,headY+dir*25)

ctx.moveTo(this.x,headY)
ctx.lineTo(this.x+3,headY+dir*25)

ctx.stroke()

}

}

/* =========================
CHOLESTEROL
========================= */

class Cholesterol{

constructor(x){
this.x=x
this.v=(Math.random()-0.5)*0.2
}

move(){

this.x+=this.v

if(this.x<0) this.x=canvas.width
if(this.x>canvas.width) this.x=0

}

draw(){

const y=mid()

ctx.fillStyle="#ffe066"

ctx.fillRect(this.x-2,y-15,4,30)

}

}

/* =========================
INTEGRAL PROTEIN
========================= */

class Protein{

constructor(x){
this.x=x
this.v=(Math.random()-0.5)*0.3
}

move(){

this.x+=this.v

if(this.x<0) this.x=canvas.width
if(this.x>canvas.width) this.x=0

}

draw(){

ctx.fillStyle="#845ef7"

ctx.beginPath()
ctx.roundRect(this.x-8,mid()-80,16,160,10)
ctx.fill()

}

}

/* =========================
GLYCOPROTEIN
========================= */

class Glycoprotein{

constructor(x){
this.x=x
}

move(){
this.x+=(Math.random()-0.5)*0.3
}

draw(){

ctx.fillStyle="#845ef7"

ctx.beginPath()
ctx.arc(this.x,mid()-80,8,0,Math.PI*2)
ctx.fill()

ctx.strokeStyle="#40c057"

ctx.beginPath()
ctx.moveTo(this.x,mid()-80)
ctx.lineTo(this.x,mid()-110)
ctx.stroke()

}

}

/* =========================
PERIPHERAL PROTEIN
========================= */

class Peripheral{

constructor(x){
this.x=x
}

move(){
this.x+=(Math.random()-0.5)*0.4
}

draw(){

ctx.fillStyle="#f06595"

ctx.beginPath()
ctx.arc(this.x,mid()+95,6,0,Math.PI*2)
ctx.fill()

}

}

/* arrays */

const lipids=[]
const cholesterol=[]
const proteins=[]
const glycoproteins=[]
const peripherals=[]

for(let i=0;i<120;i++){
lipids.push(new Lipid(Math.random()*canvas.width,"outer"))
lipids.push(new Lipid(Math.random()*canvas.width,"inner"))
}

for(let i=0;i<30;i++)
cholesterol.push(new Cholesterol(Math.random()*canvas.width))

for(let i=0;i<8;i++)
proteins.push(new Protein(Math.random()*canvas.width))

for(let i=0;i<6;i++)
glycoproteins.push(new Glycoprotein(Math.random()*canvas.width))

for(let i=0;i<8;i++)
peripherals.push(new Peripheral(Math.random()*canvas.width))

/* =========================
ANIMATION
========================= */

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

/* membrane core shading */

ctx.fillStyle="rgba(255,255,255,0.05)"
ctx.fillRect(0,mid()-60,canvas.width,120)

/* movement */

lipids.forEach(l=>{l.move();l.draw()})
cholesterol.forEach(c=>{c.move();c.draw()})
proteins.forEach(p=>{p.move();p.draw()})
glycoproteins.forEach(g=>{g.move();g.draw()})
peripherals.forEach(p=>{p.move();p.draw()})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
