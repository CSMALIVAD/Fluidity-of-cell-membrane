<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Molecular Lipid Bilayer Simulator</title>

<style>
body{
margin:0;
background:#020617;
color:white;
font-family:Arial;
text-align:center;
}

h2{
margin:8px;
}

canvas{
display:block;
margin:auto;
border:2px solid white;
width:96vw;
height:85vh;
background:#020617;
}
</style>
</head>

<body>

<h2>Molecular-Scale Lipid Bilayer Simulation</h2>
<canvas id="membrane"></canvas>

<script>

const canvas = document.getElementById("membrane")
const ctx = canvas.getContext("2d")

function resize(){
canvas.width = window.innerWidth*0.96
canvas.height = window.innerHeight*0.85
}
resize()
window.addEventListener("resize",resize)

const centerX = () => canvas.width/2
const centerY = () => canvas.height/2

const outerR = () => Math.min(canvas.width,canvas.height)/3
const innerR = () => outerR()-28


/* =========================
PHOSPHOLIPID MOLECULE
========================= */

class Lipid{

constructor(angle,leaflet){

this.angle = angle
this.leaflet = leaflet

this.kink = Math.random() > 0.6
}

move(){

this.angle += (Math.random()-0.5)*0.003

}

draw(){

const r = this.leaflet==="outer" ? outerR() : innerR()

const x = centerX()+r*Math.cos(this.angle)
const y = centerY()+r*Math.sin(this.angle)

const dir = this.leaflet==="outer" ? -1 : 1

/* head */

ctx.fillStyle="#4ea8ff"
ctx.beginPath()
ctx.arc(x,y,4,0,Math.PI*2)
ctx.fill()

/* tails */

ctx.strokeStyle="#ffd166"
ctx.lineWidth=1.5

ctx.beginPath()

if(this.kink){

/* unsaturated fatty acid */

ctx.moveTo(x,y)
ctx.lineTo(x+dir*8*Math.cos(this.angle),y+dir*8*Math.sin(this.angle))
ctx.lineTo(x+dir*13*Math.cos(this.angle+0.4),y+dir*13*Math.sin(this.angle+0.4))

}else{

/* saturated */

ctx.moveTo(x,y)
ctx.lineTo(x+dir*14*Math.cos(this.angle),y+dir*14*Math.sin(this.angle))

}

ctx.moveTo(x,y)
ctx.lineTo(x+dir*12*Math.cos(this.angle-0.25),y+dir*12*Math.sin(this.angle-0.25))

ctx.stroke()

}

}


/* =========================
CHOLESTEROL
========================= */

class Cholesterol{

constructor(angle){
this.angle=angle
}

move(){

this.angle+=(Math.random()-0.5)*0.001

}

draw(){

const r=(outerR()+innerR())/2

const x=centerX()+r*Math.cos(this.angle)
const y=centerY()+r*Math.sin(this.angle)

ctx.fillStyle="#ffe066"
ctx.fillRect(x-2,y-6,4,12)

}

}


/* =========================
MEMBRANE PROTEIN
========================= */

class Protein{

constructor(angle){

this.angle=angle

}

move(){

this.angle+=(Math.random()-0.5)*0.0015

}

draw(){

const r=(outerR()+innerR())/2

const x=centerX()+r*Math.cos(this.angle)
const y=centerY()+r*Math.sin(this.angle)

ctx.fillStyle="#9d4edd"

ctx.beginPath()
ctx.arc(x,y,8,0,Math.PI*2)
ctx.fill()

}

}


/* =========================
ION CHANNEL
========================= */

class Channel{

constructor(angle){

this.angle=angle
this.open=Math.random()>0.5

}

move(){

this.angle+=(Math.random()-0.5)*0.001

if(Math.random()<0.003){

this.open=!this.open

}

}

draw(){

const r=(outerR()+innerR())/2

const x=centerX()+r*Math.cos(this.angle)
const y=centerY()+r*Math.sin(this.angle)

ctx.fillStyle="#7b2cbf"

ctx.beginPath()
ctx.arc(x,y,9,0,Math.PI*2)
ctx.fill()

if(this.open){

ctx.strokeStyle="#00e5ff"

ctx.beginPath()
ctx.moveTo(x-3,y)
ctx.lineTo(x+3,y)
ctx.stroke()

}

}

}


/* =========================
MOLECULE ARRAYS
========================= */

const lipids=[]
const cholesterol=[]
const proteins=[]
const channels=[]

for(let i=0;i<260;i++){

lipids.push(new Lipid(Math.random()*Math.PI*2,"outer"))
lipids.push(new Lipid(Math.random()*Math.PI*2,"inner"))

}

for(let i=0;i<50;i++)
cholesterol.push(new Cholesterol(Math.random()*Math.PI*2))

for(let i=0;i<18;i++)
proteins.push(new Protein(Math.random()*Math.PI*2))

for(let i=0;i<8;i++)
channels.push(new Channel(Math.random()*Math.PI*2))


/* =========================
ANIMATION
========================= */

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

lipids.forEach(l=>{l.move();l.draw()})
cholesterol.forEach(c=>{c.move();c.draw()})
proteins.forEach(p=>{p.move();p.draw()})
channels.forEach(c=>{c.move();c.draw()})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
